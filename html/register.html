<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register • 24Air Radar</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="auth-page">

  <div class="auth-title">Register to 24Air Radar</div>

  <div class="auth-wrap">
    <form id="registerForm" class="card" style="width:320px;">
      <div class="card-header">
        <span>Register</span>
      </div>

      <input id="regEmail" type="email" placeholder="Email" required>
      <input id="regUsername" type="text" placeholder="Username" required>

      <div class="password-wrap">
        <input id="regPassword" type="password" placeholder="Password" required>
        <button type="button" class="toggle-password" data-target="regPassword">Show</button>
      </div>

      <p>Password must be at least 6 characters</p>

      <button class="primary-btn" type="submit">Register</button>

      <div class="auth-link">
        <a href="login.html">Already have an account?</a>
      </div>
    </form>
  </div>

  <script src="../scripts/script.js"></script>
</body>
</html>
