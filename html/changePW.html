<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24AM Radar</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <form id="changePWForm" class="card" style="width:320px;">
      <div class="card-header"><span>Change Password</span></div>

      <input id="currentPassword" type="password" placeholder="Current Password" required>
      <input id="newPassword" type="password" placeholder="New Password" required>

      <button class="primary-btn" type="submit">Update</button>
      <p id="changePWMsg" style="margin-top:10px;"></p>

      <div class="auth-link">
        <a href="settings.html">Back</a>
      </div>
    </form>
  </div>

  <script src="../scripts/script.js"></script>
</body>
</html>
