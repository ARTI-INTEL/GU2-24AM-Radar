  This file serves as the community page for the 24Air Radar application.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community • 24Air Radar</title>
  <link rel="stylesheet" href="../styles/style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body class="auth-page">

  <!-- Page title (same pattern as Register/Login) -->
    <header class="navbar">
        <div class="logo">Community Page</div>
        <a href="map.html" class="back">Back to map</a>

    </header>

  <div class="auth-wrap">

    <!-- Big rounded panel (reuses your .card base styling) -->
    <section class="community-layout">
      <!-- LEFT COLUMN (POSTS) -->
      <div class="posts-column">
        <!-- Create Post -->
        <form id="postForm" class="create-post">

          <textarea name="content" placeholder="Share something about aviation..." required></textarea>

          <div class="post-actions-bar">
            <input type="file" name="image" accept="image/*" title="Upload Image">
            <button type="submit">Post</button>
          </div>

        </form>

        <!-- Posts Feed -->
        <div id="posts" class="feed"></div>

      </div>

    </section>

  </div>

  <script src="../scripts/script.js"></script>
  <script src="../scripts/community.js"></script>
</body>
</html>
