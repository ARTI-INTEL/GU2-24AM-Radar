Project: 24Air Radar
Author: Muhammad Faiq Imran


Description:
  This file serves as the login page for the 24Air Radar application. 
  It provides a form for users to enter their email and password to access their account. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • 24Air Radar</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body class="auth-page">

  <div class="auth-title">Login to 24Air Radar</div>

  <div class="auth-wrap">
    <form id="loginForm" class="card" style="width:320px;">
      <div class="card-header">
        <span>Login</span>
      </div>

      <input id="loginEmail" type="email" placeholder="Email" required>

      <div class="password-wrap">
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button type="button" class="toggle-password" data-target="loginPassword">Show</button>
      </div>

      <button class="primary-btn" type="submit">Login</button>


      <div class="auth-link">
        <a href="register.html">Don't have an account?</a>
        <a href="forgotPW.html">Forgot Password?</a>
      </div>

       <!-- Legal links -->
      <div class="legal-links-row">
        <button class="legal-link" data-legal="tos">Terms of Service</button>
        <button class="legal-link" data-legal="privacy">Privacy Policy</button>
      </div>
      
    </form>
  </div>

  <script src="../scripts/script.js"></script>
</body>
</html>
